events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server auth-service:3001;
  }

  upstream ticket_service {
    server ticket-service:3002;
  }

  upstream user_service {
    server user-service:3003;
  }

  upstream attachment_service {
    server attachment-service:3004;
  }

  server {
    listen 8080;

    # Health check
    location /health {
      return 200 '{"status":"healthy","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # Auth routes
    location ~ ^/(login|register) {
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Attachment routes (before /tickets to avoid conflict)
    location ~ ^/tickets/[^/]+/attachments {
      proxy_pass http://attachment_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 10M;
    }

    # Ticket routes
    location ~ ^/(tickets|agents) {
      proxy_pass http://ticket_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # User & company routes
    location ~ ^/(users|companies|societies) {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
