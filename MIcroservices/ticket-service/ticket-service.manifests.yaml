# ── Secret ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ticket-db-secret
type: Opaque
stringData:
  username: postgres
  password: postgres
---
# ── ticket-service Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  labels:
    app: ticket-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      initContainer:
        - name: init-ticket-db
          image: sunseyy/ticket-service-db-init:latest
          env:
           - name: DB_HOST
             value: "ticket-db"
           - name: DB_PORT
             value: "5432"
           - name: DB_NAME
             value: "ticket_db"
           - name: DB_USER
             valueFrom:
               secretKeyRef:
                 name: ticket-db-secret
                 key: username
           - name: DB_PASSWORD
             valueFrom:
               secretKeyRef:
                 name: ticket-db-secret
                 key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      containers:
        - name: ticket-service
          image: sunseyy/ticket-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DB_HOST
              value: "ticket-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ticket_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ticket-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticket-db-secret
                  key: password
            - name: CORS_ORIGINS
              value: "http://frontend-service"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false 
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault    
---
# ── ticket-service Service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ticket-service
spec:
  selector:
    app: ticket-service
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
---
# ── Route ─────────────────────────────────────────────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ticket-service
spec:
  to:
    kind: Service
    name: ticket-service
  port:
    targetPort: 3002
  tls:
    termination: edge
---
# ── ticket-db Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-db
  labels:
    app: ticket-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-db
  template:
    metadata:
      labels:
        app: ticket-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ticket_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ticket-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticket-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: ticket-db-storage
              mountPath: /var/lib/postgresql/data
              
      volumes:
        - name: ticket-db-storage
          persistentVolumeClaim:
            claimName: ticket-db-pvc
---
# ── PVC ───────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ticket-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# ── ticket-db Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ticket-db
spec:
  selector:
    app: ticket-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
# ── ConfigMap: DB init SQL ────────────────────────────────────────────────────
