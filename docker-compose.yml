services:
  frontend:
    build: ./frontend
    container_name: ticket-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  db:
    image: postgres:15
    container_name: ticketing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend          # build from Dockerfile
    container_name: ticketing-backend
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ticketing
      DB_USER: postgres
      DB_PASSWORD: postgres
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend:/app        # sync local code to container
      - /app/node_modules     # keep container-installed node_modules safe
    command: sh -c "npm install && npm start"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
